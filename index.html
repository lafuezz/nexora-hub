<!DOCTYPE html>
<html>
<head>
  <title>Nexora Hub</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial;
      background-color: #0f172a;
      color:white;
      text-align: center;
    }
    /* NAVBAR */
    .navbar {
      background-color: #020617;
      padding: 15px;
      position: sticky;
      top: 0;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 15px;
      font-size: 16px;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #38bdf8;
    }

    /* HERO */
    .hero {
      padding: 80px 20px;
    }

    h1 {
      color: #38bdf8;
      font-size: 42px;
    }

    /* BUTTON */
    button {
      background-color: #38bdf8;
      color: black;
      border:none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0ea5e9;
      transform: scale(1.05);
    }

    /* SECTIONS */
    .section {
      background: #1e293b;
      padding: 30px;
      margin: 40px auto;
      border-radius: 12px;
      max-width: 600px;
    }

    h2 {
      color: #38bdf8;
    }
    </style>
</head>

<body>

  <!--NAVBAR-->
  <div class="navbar">
      <a href="#">Home</a>
      <a href="#about">About</a>
      <a href="#skills">skills</a>
      <a href="#contact">contact</a>
  </div>

  <!--HERO-->
  <div class="hero>">
       <h1>Welcome to Nexora Hub👋</h1>
       <p>I am learning web development and building real projects.</p>

       <button onclick="alert('Thanks for visiting Nexora Hub!')">
        contact me
      </button>
  <div class="section" id="about">
    <h2>About Me</h2>
       <p>I love tech, fixing computers, and learning new skills step by step.</p>
  </div>
  
  <!--SKILLS-->
  <div class="section" id="skills">
       <h2>Skills</h2>
       <p>HTML, CSS, Javascript(beginner)</p>
  </div>

  <!--CONTACT-->
  <div class="section" id="contact">
    <h2>contact</h2>
    <p>You can reach me through this website.</p>
  </div>

</body>
</html>
